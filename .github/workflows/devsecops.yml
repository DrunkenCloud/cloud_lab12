name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. SAST Scanning (CodeQL)
  sast-scan:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript # Change to python, java, etc., based on your app

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # 2. Dependency Scanning
  dependency-scan:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '0' # Set to 1 if you want the pipeline to fail on vulnerabilities
          severity: 'CRITICAL,HIGH'

  # 3. Build & Container Security Scanning
  container-security:
    name: Build & Scan Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build an image from Dockerfile
        run: docker build -t my-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # 4. DAST Scanning
  dast-scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: container-security # Waits for the container to be built successfully
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Run Container
        run: |
          docker build -t my-app-run .
          docker run -d -p 8080:8080 my-app-run
          sleep 15 # Wait for the app to start up completely

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:8080' # Ensure this matches your app's port
